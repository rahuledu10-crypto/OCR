<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#6366f1"/>
  
  <!-- Document Icon -->
  <g transform="translate(50, 40)">
    <!-- Paper -->
    <path d="M20 0 L80 0 L100 20 L100 120 L0 120 L0 20 Z" fill="white" opacity="0.95"/>
    <!-- Folded corner -->
    <path d="M80 0 L80 20 L100 20 Z" fill="white" opacity="0.7"/>
    
    <!-- Text lines -->
    <rect x="15" y="35" width="50" height="6" rx="3" fill="#6366f1" opacity="0.6"/>
    <rect x="15" y="50" width="70" height="6" rx="3" fill="#6366f1" opacity="0.4"/>
    <rect x="15" y="65" width="60" height="6" rx="3" fill="#6366f1" opacity="0.4"/>
    <rect x="15" y="80" width="70" height="6" rx="3" fill="#6366f1" opacity="0.4"/>
    <rect x="15" y="95" width="40" height="6" rx="3" fill="#6366f1" opacity="0.4"/>
  </g>
  
  <!-- Scan line effect -->
  <rect x="50" y="100" width="100" height="3" fill="#22c55e" opacity="0.8">
    <animate attributeName="y" values="80;160;80" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
